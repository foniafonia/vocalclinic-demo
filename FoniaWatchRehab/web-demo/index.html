<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d9488">
<title>EthosFlow · Apoyo a la fluidez del habla</title>
<style>
:root{
  --bg:#eef1f6; --bg2:#e6eaf1; --card:#ffffff; --ink:#16202c; --muted:#5b6675;
  --line:#e3e8ef; --teal:#0d9488; --teal-d:#0b7d72; --indigo:#4f46e5; --amber:#d97706;
  --red:#dc2626; --green:#16a34a; --gray:#94a3b8;
  --eff:#16a34a; --dis:#e0a82e; --sil:#9aa7b8; --pau:#4f46e5;
  --shadow:0 6px 22px rgba(20,30,45,.08); --shadow-s:0 2px 8px rgba(20,30,45,.06);
  --r:18px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select{font-family:inherit;}
.app{max-width:460px; margin:0 auto; min-height:100vh; background:var(--bg);
  display:flex; flex-direction:column; position:relative; padding-bottom:78px;}
@media(min-width:560px){ .app{box-shadow:0 0 60px rgba(0,0,0,.12); min-height:100vh;} body{padding:0;} }

/* ---------- Top bar ---------- */
.topbar{position:sticky; top:0; z-index:30; background:rgba(238,241,246,.86);
  backdrop-filter:blur(12px); padding:14px 18px 10px; border-bottom:1px solid var(--line);}
.topbar .brand{display:flex; align-items:center; gap:9px;}
.logo{width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,var(--teal),var(--indigo));
  display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px;
  box-shadow:var(--shadow-s);}
.topbar h1{font-size:18px; margin:0; font-weight:700; letter-spacing:-.3px;}
.topbar .sub{font-size:12px; color:var(--muted); margin-left:auto; text-align:right;}
.topbar .sub b{display:block; color:var(--ink); font-weight:600; text-transform:capitalize;}

/* ---------- Layout ---------- */
.screen{padding:16px 16px 8px; animation:fade .25s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
.card{background:var(--card); border-radius:var(--r); padding:16px; box-shadow:var(--shadow); margin-bottom:14px;
  border:1px solid rgba(255,255,255,.6);}
.card.tight{padding:13px 14px;}
.sec-h{display:flex; align-items:center; justify-content:space-between; margin:2px 4px 10px;}
.sec-h h2{font-size:15px; margin:0; font-weight:700; color:var(--ink);}
.sec-h .link{font-size:13px; color:var(--teal); font-weight:600;}
.eyebrow{font-size:11px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--muted);}
.muted{color:var(--muted);} .small{font-size:13px;} .xs{font-size:11.5px;}
.center{text-align:center;}
.rowflex{display:flex; gap:10px;} .rowflex>*{flex:1;}
.spacer{height:6px;}

/* ---------- Buttons ---------- */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
  padding:14px 16px; border-radius:14px; font-size:16px; font-weight:700; transition:.12s;
  background:var(--card); color:var(--ink); box-shadow:var(--shadow-s); border:1px solid var(--line);}
.btn:active{transform:scale(.98);}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal-d)); color:#fff; border:none; box-shadow:0 8px 20px rgba(13,148,136,.32);}
.btn.indigo{background:linear-gradient(135deg,#5b54e8,var(--indigo)); color:#fff; border:none;}
.btn.ghost{background:transparent; box-shadow:none;}
.btn.sm{padding:10px 12px; font-size:14px; border-radius:11px; width:auto;}
.btn.danger{color:var(--red); border-color:#f3c9c9;}
.btn.block{width:100%;}
.chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:6px 11px;
  border-radius:999px; background:var(--bg2); color:var(--muted);}
.chip.ok{background:#e7f6ee; color:#0f7a43;}

/* ---------- Metrics ---------- */
.metric-grid{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.metric{background:var(--card); border-radius:14px; padding:13px; box-shadow:var(--shadow-s); border:1px solid var(--line);}
.metric .v{font-size:25px; font-weight:800; letter-spacing:-.5px; line-height:1.1;}
.metric .l{font-size:12px; color:var(--muted); margin-top:3px;}
.metric .v small{font-size:13px; font-weight:600; color:var(--muted);}
.delta{font-size:12px; font-weight:700;} .delta.up{color:var(--green);} .delta.down{color:var(--red);} .delta.flat{color:var(--muted);}

/* ---------- Capacity gauge ---------- */
.cap-card{background:linear-gradient(135deg,#0f766e,#3b3aa3); color:#fff; border:none;}
.cap-card .eyebrow{color:rgba(255,255,255,.75);}
.cap-row{display:flex; align-items:center; gap:16px;}
.cap-val{font-size:42px; font-weight:800; letter-spacing:-1px; line-height:1;}
.cap-band{font-size:14px; font-weight:700; margin-top:2px;}
.cap-rec{font-size:13.5px; color:rgba(255,255,255,.92); margin-top:9px; line-height:1.5;}
.cap-card .obj{margin-top:11px; background:rgba(255,255,255,.14); border-radius:12px; padding:9px 12px; font-size:13px;}

/* ---------- Sliders ---------- */
.slider-row{margin:13px 0;}
.slider-row label{display:flex; justify-content:space-between; font-size:14px; font-weight:600; margin-bottom:7px;}
.slider-row label b{color:var(--teal);}
input[type=range]{width:100%; height:6px; -webkit-appearance:none; appearance:none; background:var(--line);
  border-radius:99px; outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:26px; height:26px; border-radius:50%;
  background:#fff; border:3px solid var(--teal); box-shadow:var(--shadow-s); cursor:pointer;}
input[type=range]::-moz-range-thumb{width:22px; height:22px; border-radius:50%; background:#fff; border:3px solid var(--teal); cursor:pointer;}

/* ---------- Toggle ---------- */
.toggle{display:flex; justify-content:space-between; align-items:center; padding:13px 2px; border-bottom:1px solid var(--line);}
.toggle:last-child{border-bottom:none;}
.toggle .t{font-size:14.5px; font-weight:600;}
.toggle .d{font-size:12px; color:var(--muted); margin-top:2px; max-width:230px;}
.sw{width:48px; height:29px; border-radius:99px; background:#cdd5e0; position:relative; transition:.2s; flex:none;}
.sw.on{background:var(--teal);}
.sw i{position:absolute; top:3px; left:3px; width:23px; height:23px; border-radius:50%; background:#fff; transition:.2s; box-shadow:var(--shadow-s);}
.sw.on i{left:22px;}
.segctl{display:flex; background:var(--bg2); border-radius:12px; padding:4px; gap:4px;}
.segctl button{flex:1; padding:9px; border-radius:9px; font-size:13px; font-weight:700; color:var(--muted);}
.segctl button.on{background:#fff; color:var(--ink); box-shadow:var(--shadow-s);}

/* ---------- Bottom nav ---------- */
.tabbar{position:fixed; bottom:0; left:0; right:0; max-width:460px; margin:0 auto; z-index:40;
  background:rgba(255,255,255,.92); backdrop-filter:blur(14px); border-top:1px solid var(--line);
  display:flex; padding:7px 6px calc(7px + env(safe-area-inset-bottom));}
.tabbar button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:5px 0;
  font-size:10.5px; font-weight:600; color:var(--muted);}
.tabbar button .ic{font-size:21px; line-height:1;}
.tabbar button.on{color:var(--teal);}

/* ---------- Session ---------- */
.session-wrap{position:fixed; inset:0; max-width:460px; margin:0 auto; background:linear-gradient(170deg,#0d2a35,#10203f 60%,#1a1740);
  color:#fff; z-index:60; display:flex; flex-direction:column; padding:20px 18px calc(18px + env(safe-area-inset-bottom)); overflow-y:auto;}
.session-wrap.breathe{background:linear-gradient(170deg,#0b3a44,#0d2740);}
.phase-top{display:flex; justify-content:space-between; align-items:center;}
.phase-name{font-size:14px; font-weight:700; color:#7fe6d4;}
.phase-x{font-size:14px; color:rgba(255,255,255,.7);}
.phase-steps{display:flex; gap:5px; margin:14px 0;}
.phase-steps .s{flex:1; height:4px; border-radius:99px; background:rgba(255,255,255,.18);}
.phase-steps .s.done{background:#7fe6d4;} .phase-steps .s.cur{background:#fff;}
.ses-big{font-size:60px; font-weight:800; letter-spacing:-2px; text-align:center; line-height:1;}
.ses-lbl{text-align:center; color:rgba(255,255,255,.7); font-size:12px; letter-spacing:1px; text-transform:uppercase; font-weight:700;}
.timer{text-align:center; font-size:15px; color:rgba(255,255,255,.85); font-variant-numeric:tabular-nums; margin-top:6px;}
.live-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0;}
.live{background:rgba(255,255,255,.08); border-radius:13px; padding:11px 12px;}
.live .v{font-size:20px; font-weight:800;} .live .l{font-size:11px; color:rgba(255,255,255,.7);}
.timeline{height:26px; border-radius:8px; overflow:hidden; display:flex; background:rgba(255,255,255,.1); margin:6px 0;}
.timeline span{height:100%;}
.tl-key{display:flex; flex-wrap:wrap; gap:10px; font-size:11px; color:rgba(255,255,255,.8); margin-top:6px;}
.tl-key i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:4px; vertical-align:-1px;}
.reco{background:rgba(127,230,212,.14); border:1px solid rgba(127,230,212,.3); border-radius:13px; padding:12px 14px;
  font-size:13.5px; margin:14px 0; color:#d9fff7;}
.reco b{color:#fff;}
.activation-bar{height:8px; border-radius:99px; background:rgba(255,255,255,.15); overflow:hidden; margin-top:6px;}
.activation-bar i{display:block; height:100%; background:linear-gradient(90deg,#7fe6d4,#ffd479,#ff8a8a); transition:width .3s;}
.mic-pill{display:inline-flex; align-items:center; gap:7px; font-size:12px; padding:6px 12px; border-radius:99px;
  background:rgba(255,255,255,.12); color:rgba(255,255,255,.9); margin:0 auto;}
.session-actions{margin-top:auto; padding-top:16px;}
.btn.light{background:#fff; color:#10203f;} .btn.outline-l{background:transparent; border:1px solid rgba(255,255,255,.35); color:#fff; box-shadow:none;}

/* breathing */
.breath-stage{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;}
.breath-orb{width:200px; height:200px; border-radius:50%; background:radial-gradient(circle at 50% 40%,rgba(127,230,212,.5),rgba(79,70,229,.25));
  display:flex; align-items:center; justify-content:center; transition:transform 4s ease-in-out; box-shadow:0 0 60px rgba(127,230,212,.25);}
.breath-orb .ph{font-size:20px; font-weight:700;}
.breath-count{font-size:48px; font-weight:800; color:#fff;}

/* metronome */
.metro-orb{width:120px; height:120px; border-radius:50%; margin:10px auto; background:var(--bg2);
  display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:800; color:var(--muted);
  transition:transform .07s, background .07s, color .07s;}
.metro-orb.on{background:linear-gradient(135deg,var(--teal),var(--indigo)); color:#fff; transform:scale(1.12);}

/* charts */
.chart-box{width:100%;} .chart-box svg{width:100%; height:auto; display:block; overflow:visible;}
.legend-row{display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--muted); margin-top:8px;}
.legend-row i{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px;}

/* report */
.report-pre{background:#0f1722; color:#cfe6df; border-radius:13px; padding:14px; font-size:12px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre-wrap; max-height:300px; overflow-y:auto; line-height:1.5;}

/* empty state */
.empty{text-align:center; padding:26px 16px; color:var(--muted);}
.empty .ic{font-size:34px; opacity:.5;}
.empty p{font-size:13.5px; margin:8px 0 0;}

/* disclaimer */
.disclaimer{font-size:11.5px; color:var(--muted); text-align:center; padding:6px 20px 16px; line-height:1.5;}
.note-inline{font-size:11.5px; color:var(--muted); margin-top:8px; display:flex; gap:6px; align-items:flex-start;}
.note-inline .i{color:var(--teal); font-weight:800;}

/* toast */
.toast{position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0;
  background:#16202c; color:#fff; padding:11px 18px; border-radius:12px; font-size:13.5px; font-weight:600;
  z-index:80; transition:.25s; box-shadow:0 10px 30px rgba(0,0,0,.3); pointer-events:none; max-width:90%;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(15,23,34,.5); z-index:70; display:flex; align-items:flex-end; justify-content:center;
  max-width:460px; margin:0 auto;}
.modal{background:var(--card); border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-height:88vh; overflow-y:auto; animation:up .25s ease;}
@keyframes up{from{transform:translateY(40px);} to{transform:none;}}
.modal h3{margin:2px 0 4px; font-size:17px;}
.pill-row{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;}
.opt{flex:1; min-width:120px; text-align:left; padding:12px 13px; border-radius:13px; border:1.5px solid var(--line); background:var(--card);}
.opt.on{border-color:var(--teal); background:#effaf8;}
.opt b{font-size:14px;} .opt span{font-size:12px; color:var(--muted); display:block; margin-top:2px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">EF</div>
      <h1>EthosFlow</h1>
      <div class="sub" id="topsub"></div>
    </div>
  </div>
  <div id="root"></div>
</div>
<div class="tabbar" id="tabbar"></div>
<div id="overlay"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
//==================================================================
// EthosFlow — apoyo a la fluidez del habla (tartamudez/ritmo/respiración)
// App web autocontenida. Sin backend. Datos solo en este dispositivo.
// El análisis de voz es ESTIMADO y no diagnostica ni sustituye terapia.
//==================================================================

//------------------- Estado / persistencia -------------------
const KEY = "ethosflow.v2";
const todayStr = () => new Date().toISOString().slice(0,10);

const DEFAULT = {
  settings:{ profile:"paciente", micSensitivity:55, baseBPM:66, vibration:true, dailyGoalMin:10,
             presentation:false },
  checkins:{},      // {fecha: {sleep,fatigue,stress}}
  sessions:[],      // [{date,ts,durationSec,ses,efficientSec,disfluencySec,silenceSec,pauseSec,regPauses,segments,activation,notes,mode}]
  seeded:false
};
let S = loadState();

function loadState(){
  try{ const d=JSON.parse(localStorage.getItem(KEY)); if(d&&d.settings) return d; }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

//------------------- Datos demo realistas -------------------
function seedDemo(force){
  if(S.seeded && !force) return;
  S.sessions=[]; S.checkins={};
  const base=58;
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); const ds=d.toISOString().slice(0,10);
    // tendencia ascendente con ruido
    const trend=base + (13-i)*1.4 + (Math.random()*10-5);
    S.checkins[ds]={ sleep:5+Math.round(Math.random()*4), fatigue:3+Math.round(Math.random()*4), stress:3+Math.round(Math.random()*5) };
    const nSess = i%3===0?0:1; // algún día de descanso
    for(let k=0;k<nSess;k++){
      const dur=420+Math.round(Math.random()*360);
      const ses=Math.max(35,Math.min(92,Math.round(trend)));
      const eff=Math.round(dur*(ses/100)*0.92);
      const dis=Math.round(dur*((100-ses)/100)*0.45);
      const sil=Math.round(dur*0.12);
      const pau=dur-eff-dis-sil>0?dur-eff-dis-sil:Math.round(dur*0.08);
      S.sessions.push({ date:ds, ts:d.getTime()+k*3600000, durationSec:dur, ses,
        efficientSec:eff, disfluencySec:dis, silenceSec:sil, pauseSec:pau,
        regPauses:2+Math.round(Math.random()*3), activation:35+Math.round(Math.random()*30),
        segments:demoSegments(eff,dis,sil,pau), notes:"", mode:"demo" });
    }
  }
  S.seeded=true; save();
}
function demoSegments(eff,dis,sil,pau){
  const segs=[]; let pool=[["efficient",eff],["disfluency",dis],["silence",sil],["pause",pau]];
  for(let n=0;n<14;n++){ const p=pool[Math.floor(Math.random()*pool.length)]; segs.push({type:p[0], sec:Math.max(2,Math.round(p[1]/6))}); }
  return segs;
}

//------------------- Hápticos -------------------
function buzz(p){ if(S.settings.vibration && navigator.vibrate) navigator.vibrate(p); }

//------------------- Toast -------------------
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

//------------------- Helpers de cálculo -------------------
const fmtTime=s=>{ s=Math.round(s); const m=Math.floor(s/60), r=s%60; return m+":"+String(r).padStart(2,"0"); };
const sum=(a,f)=>a.reduce((x,y)=>x+(f?f(y):y),0);
function sessionsOn(ds){ return S.sessions.filter(s=>s.date===ds); }
function minutesTrained(ds){ return Math.round(sum(sessionsOn(ds),s=>s.durationSec)/60); }
function avgSES(list){ const a=list.filter(s=>s.ses>0); return a.length?Math.round(sum(a,s=>s.ses)/a.length):0; }
function last7(){ const out=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); out.push(d.toISOString().slice(0,10)); } return out; }
// Serie SES con arrastre del último valor en días sin sesión (evita caídas a 0 engañosas).
function sesSeries(days){
  const raw=days.map(d=>avgSES(sessionsOn(d)));
  const firstKnown=raw.find(v=>v>0)||0; let last=0;
  return raw.map(v=>{ if(v>0){ last=v; return v; } return last||firstKnown; });
}
function last14(){ const out=[]; for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); out.push(d.toISOString().slice(0,10)); } return out; }

// SES global reciente y media
function recentSES(){ const s=S.sessions.slice(-5); return avgSES(s); }
function overallAvgSES(){ return avgSES(S.sessions); }
function sesTrend(){ // pendiente simple últimos vs previos
  const s=S.sessions.filter(x=>x.ses>0); if(s.length<4) return 0;
  const half=Math.floor(s.length/2);
  const older=avgSES(s.slice(0,half)), newer=avgSES(s.slice(half));
  return newer-older;
}

//------------------- Índice de capacidad (estimado, orientativo) -------------------
function capacityIndex(){
  const ci=S.checkins[todayStr()];
  // Si no hay check-in, capacidad neutra con aviso
  const sleep = ci? ci.sleep : 6;       // 0-10 (más=mejor)
  const fatigue = ci? ci.fatigue : 5;   // 0-10 (más=peor)
  const stress = ci? ci.stress : 5;     // 0-10 (más=peor)
  const recent = sessionsOn(todayStr()).length + Math.min(3, S.sessions.slice(-3).length);
  const trend = sesTrend(); // -x..+x
  // Ponderación orientativa
  let score = 0;
  score += (sleep/10)*32;
  score += ((10-fatigue)/10)*26;
  score += ((10-stress)/10)*22;
  score += Math.min(recent,4)/4*10;
  score += Math.max(-10,Math.min(10,trend))/10*10 + 0; // tendencia
  score = Math.max(8, Math.min(98, Math.round(score)));
  let band, rec, obj, warn=false;
  if(score>=70){ band="Capacidad alta"; rec="Buen día para una sesión completa y para practicar frases más largas o situaciones que sueles evitar.";
    obj=Math.max(8,S.settings.dailyGoalMin)+" min · ritmo conversación"; }
  else if(score>=45){ band="Capacidad media"; rec="Sesión estándar centrada en ritmo y respiración. Mantén objetivos realistas y celebra el habla eficiente.";
    obj=Math.max(7,Math.round(S.settings.dailyGoalMin*0.8))+" min · ritmo medio"; }
  else { band="Capacidad baja"; rec="Hoy prioriza regulación: respiración y ritmo lento. Sesión breve y amable contigo. Evita exigirte situaciones difíciles.";
    obj="4–5 min · respiración + ritmo lento"; warn=true; }
  return { score, band, rec, obj, warn, hasCheckin:!!ci };
}

//==================================================================
// MOTOR DE AUDIO (estimación local de actividad vocal, sin grabar)
//==================================================================
const Audio = {
  ctx:null, analyser:null, data:null, stream:null, available:false, active:false,
  async start(){
    try{
      if(!navigator.mediaDevices || !window.AudioContext && !window.webkitAudioContext) throw 0;
      this.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      const AC=window.AudioContext||window.webkitAudioContext; this.ctx=new AC();
      const src=this.ctx.createMediaStreamSource(this.stream);
      this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=1024;
      this.data=new Float32Array(this.analyser.fftSize);
      src.connect(this.analyser);
      this.available=true; this.active=true; return true;
    }catch(e){ this.available=false; this.active=false; return false; }
  },
  level(){ // RMS 0..1 (estimado), o null si no hay micro
    if(!this.active||!this.analyser) return null;
    this.analyser.getFloatTimeDomainData(this.data);
    let s=0; for(let i=0;i<this.data.length;i++) s+=this.data[i]*this.data[i];
    const rms=Math.sqrt(s/this.data.length);
    return Math.max(0,Math.min(1, rms*8));
  },
  stop(){ try{ this.stream&&this.stream.getTracks().forEach(t=>t.stop()); this.ctx&&this.ctx.close(); }catch(e){}
    this.active=false; this.analyser=null; this.stream=null; this.ctx=null; }
};

let SESSION=null;
async function startSession(){
  SESSION={ phaseIdx:0, startTs:Date.now(), tEff:0, tDis:0, tSil:0, tPause:0, regPauses:0,
            segments:[], curSeg:null, activation:30, micOn:false, phaseElapsed:0, running:true, tick:null, raf:null };
  // intento de micrófono
  const ok=await Audio.start();
  SESSION.micOn=ok;
  renderSession();
  runPhaseLoop();
}
function curPhase(){ return PHASES[SESSION.phaseIdx]; }
function runPhaseLoop(){
  clearInterval(SESSION.tick);
  SESSION.phaseElapsed=0;
  const p=curPhase();
  if(p.kind==="close"){ renderSession(); return; }
  if(p.kind==="breath"){ renderSession(); return; } // respiración se gestiona aparte
  SESSION.tick=setInterval(()=>{
    if(!SESSION.running) return;
    SESSION.phaseElapsed+=0.1;
    sampleSpeech(p);
    if(p.dur && SESSION.phaseElapsed>=p.dur){ nextPhase(); }
    updateSessionLive();
  },100);
}
function sampleSpeech(p){
  if(p.kind!=="listen" && p.kind!=="rhythm") return;
  let lvl=Audio.level();
  if(lvl===null){ // simulado realista
    const t=Date.now()/600;
    lvl=0.5+0.35*Math.sin(t)+0.1*Math.sin(t*3.3)+(Math.random()*0.2-0.1);
    lvl=Math.max(0,Math.min(1,lvl));
  }
  const thr=(100-S.settings.micSensitivity)/100*0.5+0.05;
  let type;
  if(lvl<thr*0.5) type="silence";
  else if(lvl<thr) type="disfluency";          // voz baja/entrecortada -> estimado disfluencia
  else type="efficient";
  // ritmo: pequeña probabilidad de marcar disfluencia si fuera de pulso (estimado)
  if(p.kind==="rhythm" && type==="efficient" && Math.random()<0.06) type="disfluency";
  if(type==="efficient") SESSION.tEff+=0.1;
  else if(type==="disfluency") SESSION.tDis+=0.1;
  else SESSION.tSil+=0.1;
  // activación estimada (suaviza)
  const target=Math.round(lvl*100*0.7 + (SESSION.tDis>SESSION.tEff?20:0));
  SESSION.activation=Math.round(SESSION.activation*0.92+target*0.08);
  // segmentos agrupados
  const last=SESSION.segments[SESSION.segments.length-1];
  if(last && last.type===type) last.sec+=0.1;
  else SESSION.segments.push({type, sec:0.1});
}
function liveSES(){
  const voiced=SESSION.tEff+SESSION.tDis;
  if(voiced<1) return 0;
  let ses=(SESSION.tEff/voiced)*100;
  // penaliza silencio excesivo levemente
  const tot=voiced+SESSION.tSil;
  ses=ses*(0.85+0.15*(voiced/tot));
  return Math.max(0,Math.min(100,Math.round(ses)));
}
function liveReco(){
  const ses=liveSES(); const p=curPhase();
  if(p.kind==="prep") return "Siéntate cómodo. Afloja mandíbula y hombros. Respira por la nariz antes de empezar.";
  if(p.kind==="rhythm") return "Acompaña cada pulso con una sílaba. Suave y continuo, sin forzar.";
  if(SESSION.activation>72) return "Activación alta. Baja el ritmo, alarga la vocal y usa una pausa reguladora.";
  if(ses>=75) return "Buen flujo. Mantén este ritmo y alarga ligeramente las frases.";
  if(ses>=50) return "Vas bien. Marca pausas entre frases y prioriza el inicio suave de palabra.";
  if(ses>0) return "Reduce la velocidad. Inicia las palabras con suavidad y respira antes de cada frase.";
  return "Empieza a hablar cuando estés listo. No hay prisa.";
}
function nextPhase(){
  clearInterval(SESSION.tick);
  if(SESSION.phaseIdx<PHASES.length-1){ SESSION.phaseIdx++; buzz(14);
    if(curPhase().kind==="breath"){ renderSession(); return; }
    if(curPhase().kind==="close"){ finishSession(); return; }
    renderSession(); runPhaseLoop();
  } else { finishSession(); }
}
function addRegPause(){ SESSION.regPauses++; SESSION.tPause+=4; SESSION.segments.push({type:"pause",sec:4}); buzz([0,30,60,30]); toast("Pausa reguladora ✓"); updateSessionLive(); }

function finishSession(){
  clearInterval(SESSION.tick); Audio.stop();
  SESSION.phaseIdx=PHASES.length-1; // close
  const dur=Math.round((SESSION.tEff+SESSION.tDis+SESSION.tSil+SESSION.tPause));
  const rec={ date:todayStr(), ts:Date.now(),
    durationSec:Math.max(dur, Math.round((Date.now()-SESSION.startTs)/1000)),
    ses:liveSES(), efficientSec:Math.round(SESSION.tEff), disfluencySec:Math.round(SESSION.tDis),
    silenceSec:Math.round(SESSION.tSil), pauseSec:Math.round(SESSION.tPause), regPauses:SESSION.regPauses,
    activation:SESSION.activation, segments:SESSION.segments.map(s=>({type:s.type,sec:Math.round(s.sec*10)/10})),
    notes:"", mode:SESSION.micOn?"micro":"demo" };
  S.sessions.push(rec); save();
  SESSION.saved=rec;
  renderSession();
}

function exitSession(){
  clearInterval(SESSION.tick); Audio.stop(); SESSION.running=false;
  closeOverlay(); SESSION=null; nav('inicio');
}

let BREATH=null;
function openBreathing(context){ // context: "session" o null
  const pattern=S.breathPattern||[4,0,6]; // inhala, retén, exhala
  BREATH={ context, phase:0, count:pattern[0], pattern, cycles:0, running:true, iv:null };
  const ov=h(`<div class="session-wrap breathe">
    <div class="phase-top"><div class="phase-name">🌬️ Respiración guiada</div><button class="phase-x" id="bx">✕</button></div>
    <div class="center" style="margin-top:4px"><div class="segctl" style="max-width:240px;margin:0 auto">
      <button data-p="4-0-6" class="${eqPat(pattern,[4,0,6])?'on':''}">4 · 6</button>
      <button data-p="4-4-6" class="${eqPat(pattern,[4,4,6])?'on':''}">4 · 4 · 6</button>
    </div></div>
    <div class="breath-stage">
      <div class="breath-orb" id="orb"><div class="ph" id="bph">Inhala</div></div>
      <div class="breath-count" id="bcount">4</div>
      <div class="small" style="color:rgba(255,255,255,.7)">Ciclos: <span id="bcyc">0</span></div>
    </div>
    <div class="reco">Respira por la nariz, suelta hombros y mandíbula. La exhalación, larga y sin esfuerzo.</div>
    <div class="session-actions">
      ${context==="session"?'<button class="btn light" id="bback" style="margin-bottom:8px">Volver al habla guiada ›</button>':''}
      <button class="btn outline-l" id="bstop">${context==="session"?'Saltar respiración':'Terminar'}</button>
    </div>
  </div>`);
  overlay(ov,true);
  ov.querySelectorAll('.segctl button').forEach(b=>b.onclick=()=>{ const p=b.dataset.p.split('-').map(Number); S.breathPattern=p; save(); closeOverlay(); openBreathing(context); });
  ov.querySelector('#bx').onclick=()=>endBreathing(false);
  ov.querySelector('#bstop').onclick=()=>endBreathing(true);
  const bb=ov.querySelector('#bback'); if(bb) bb.onclick=()=>endBreathing(true);
  runBreath();
}
function eqPat(a,b){ return a[0]===b[0]&&a[1]===b[1]&&a[2]===b[2]; }
function runBreath(){
  const phases=[["Inhala",BREATH.pattern[0]],["Retén",BREATH.pattern[1]],["Exhala",BREATH.pattern[2]]];
  applyOrb(phases);
  BREATH.iv=setInterval(()=>{
    if(!BREATH.running) return;
    BREATH.count--;
    if(BREATH.count<=0){
      BREATH.phase=(BREATH.phase+1)%3;
      if(BREATH.pattern[BREATH.phase]===0) BREATH.phase=(BREATH.phase+1)%3;
      BREATH.count=BREATH.pattern[BREATH.phase];
      buzz(20);
      if(BREATH.phase===0){ BREATH.cycles++; const c=document.getElementById('bcyc'); if(c)c.textContent=BREATH.cycles; }
      applyOrb(phases);
    }
    const bc=document.getElementById('bcount'); if(bc) bc.textContent=BREATH.count;
  },1000);
}
function applyOrb(phases){
  const name=phases[BREATH.phase][0]; const orb=document.getElementById('orb'); const ph=document.getElementById('bph');
  const bc=document.getElementById('bcount'); if(bc) bc.textContent=BREATH.count;
  if(ph) ph.textContent=name;
  if(orb){ orb.style.transitionDuration=BREATH.pattern[BREATH.phase]+'s';
    orb.style.transform = name==="Inhala"?"scale(1.35)": name==="Exhala"?"scale(0.78)":"scale(1.35)"; }
}
function endBreathing(toGuided){
  clearInterval(BREATH&&BREATH.iv); const ctx=BREATH?BREATH.context:null; BREATH=null;
  if(ctx==="session" && SESSION){ closeOverlay(); SESSION.tPause+=BREATH? 0:0; nextPhase(); }
  else { closeOverlay(); }
}

let METRO=null;
const RHYTHM_MODES={ lento:{bpm:54,label:"Lento"}, medio:{bpm:72,label:"Medio"}, conversacion:{bpm:96,label:"Conversación"} };
const RHYTHM_SETS={
  silabas:["pa","ta","ka","ma","pa-ta-ka","la-le-li"],
  palabras:["casa","camino","mañana","tranquilo","despacio","respiro"],
  frases:["voy con calma","hablo despacio","una sílaba cada vez","respiro y sigo"]
};
function openRhythm(fromSession){
  let mode="medio", set="silabas", bpm=S.settings.baseBPM, running=false, beats=0, hits=0, lastBeat=0, idx=0;
  const ov=h(`<div class="session-wrap" style="background:linear-gradient(170deg,#10203f,#1a1740)">

    <div class="metro-orb" id="orb">♪</div>
    <div class="center timer" id="bpmLbl">${bpm} BPM · Medio</div>
    <div class="segctl" style="margin:14px 0">
      <button data-m="lento">Lento</button><button data-m="medio" class="on">Medio</button><button data-m="conversacion">Conversación</button>
    </div>
    <div class="segctl">
      <button data-s="silabas" class="on">Sílabas</button><button data-s="palabras">Palabras</button><button data-s="frases">Frases</button>

    <div class="slider-row" style="margin-top:14px"><label style="color:#fff">Ajuste fino BPM <b id="bpmOut" style="color:#7fe6d4">${bpm}</b></label>
      <input type="range" min="40" max="120" step="2" value="${bpm}" id="bpmR"></div>
    <div class="live-grid"><div class="live"><div class="v" id="mBeats">0</div><div class="l">Pulsos</div></div>
      <div class="live"><div class="v" id="mSync">—</div><div class="l">Sincronía estimada</div></div></div>
    <div class="reco">Toca <b>“A tiempo”</b> en cada pulso para estimar tu sincronía. Acompaña con la sílaba o palabra mostrada.</div>
    <div class="session-actions">
      <button class="btn light" id="tap" style="margin-bottom:8px" disabled>👆 A tiempo</button>
      <div class="rowflex">
        <button class="btn outline-l" id="pause">⏸ Pausa reguladora</button>
        <button class="btn light" id="toggle">▶ Iniciar</button>
      </div>
      ${fromSession?'<button class="btn outline-l" id="backSess" style="margin-top:8px">Volver a la sesión ›</button>':''}
    </div>
  </div>`);
  overlay(ov,true);
  const $=s=>ov.querySelector(s);
  function setStim(){ const arr=RHYTHM_SETS[set]; $('#stim').textContent=arr[idx%arr.length]; }
  setStim();
  function applyMode(){ bpm=RHYTHM_MODES[mode].bpm; $('#bpmR').value=bpm; $('#bpmOut').textContent=bpm; $('#bpmLbl').textContent=`${bpm} BPM · ${RHYTHM_MODES[mode].label}`; if(running){ stop(); start(); } }
  ov.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{ ov.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); mode=b.dataset.m; applyMode(); buzz(6); });
  ov.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{ ov.querySelectorAll('[data-s]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); set=b.dataset.s; idx=0; setStim(); buzz(6); });
  $('#bpmR').oninput=()=>{ bpm=+$('#bpmR').value; $('#bpmOut').textContent=bpm; $('#bpmLbl').textContent=`${bpm} BPM · ${RHYTHM_MODES[mode].label}`; if(running){ stop(); start(); } };
  function start(){ running=true; beats=0; hits=0; $('#toggle').textContent="⏸ Detener"; $('#tap').disabled=false;
    METRO=setInterval(()=>{ beats++; $('#mBeats').textContent=beats; idx++; setStim(); buzz(16); lastBeat=Date.now();
      const o=$('#orb'); o.classList.add('on'); setTimeout(()=>o.classList.remove('on'),110); }, 60000/bpm); }
  function stop(){ running=false; clearInterval(METRO); METRO=null; $('#toggle').textContent="▶ Iniciar"; $('#tap').disabled=true; }
  $('#toggle').onclick=()=>{ running?stop():start(); };
  $('#tap').onclick=()=>{ if(!running) return; const diff=Math.abs(Date.now()-lastBeat); const window=60000/bpm;
    const acc=Math.max(0,1-diff/(window/2)); hits+=acc; const sync=Math.round(hits/Math.max(1,beats)*100);
    $('#mSync').textContent=sync+'%'; buzz(8); };
  $('#pause').onclick=()=>{ buzz([0,30,60,30]); toast("Pausa reguladora · respira y retoma"); };
  $('#mx').onclick=()=>{ stop(); if(fromSession){ closeOverlay(); renderSession(); } else { closeOverlay(); } };
  const bs=$('#backSess'); if(bs) bs.onclick=()=>{ stop(); closeOverlay(); renderSession(); };
}

// GRÁFICAS SVG (sin librerías)
//==================================================================
function lineChartSVG(values,opt){
  opt=opt||{}; const W=320,H=opt.h||110, pad=22, padT=12, padB=opt.labels?20:8;
  const max=Math.max(10,...values), min=0;
  const n=values.length; const iw=W-pad*2;
  const x=i=> pad + (n<=1?iw/2:i*(iw/(n-1)));
  const y=v=> padT + (1-(v-min)/(max-min))*(H-padT-padB);
  let d="",area="";
  const pts=values.map((v,i)=>[x(i),y(v)]);
  pts.forEach((p,i)=>{ d+=(i?" L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1); });
  area=`M${pts[0][0]} ${H-padB} `+pts.map(p=>`L${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" ")+` L${pts[n-1][0]} ${H-padB} Z`;
  const gid="g"+Math.random().toString(36).slice(2,7);
  let labels="";
  if(opt.labels) labels=opt.labels.map((l,i)=>`<text x="${x(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#9aa7b8">${l}</text>`).join("");
  let dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===n-1?3.5:2.3}" fill="${opt.color}"/>`).join("");
  return `<div class="chart-box"><svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${opt.color}" stop-opacity="0.28"/><stop offset="1" stop-color="${opt.color}" stop-opacity="0"/></linearGradient></defs>
    ${[0.25,0.5,0.75].map(g=>`<line x1="${pad}" x2="${W-pad}" y1="${padT+g*(H-padT-padB)}" y2="${padT+g*(H-padT-padB)}" stroke="#eef1f6"/>`).join("")}
    ${opt.fill?`<path d="${area}" fill="url(#${gid})"/>`:""}
    <path d="${d}" fill="none" stroke="${opt.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${labels}</svg></div>`;
}
function barChartSVG(values,opt){
  opt=opt||{}; const W=320,H=opt.h||100, pad=14, padT=10, padB=opt.labels?18:6;
  const max=Math.max(opt.goal||0,1,...values); const n=values.length;
  const iw=W-pad*2; const bw=iw/n*0.6; const gap=iw/n;
  const y=v=> padT+(1-v/max)*(H-padT-padB);
  let bars=values.map((v,i)=>{ const bx=pad+i*gap+(gap-bw)/2; const by=y(v); const bh=(H-padB)-by;
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,bh).toFixed(1)}" rx="3" fill="${opt.color}"/>`; }).join("");
  let goalLine=opt.goal?`<line x1="${pad}" x2="${W-pad}" y1="${y(opt.goal)}" y2="${y(opt.goal)}" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 3"/>`:"";
  let labels=opt.labels?opt.labels.map((l,i)=>`<text x="${pad+i*gap+gap/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#9aa7b8">${l}</text>`).join(""):"";
  return `<div class="chart-box"><svg viewBox="0 0 ${W} ${H}">${goalLine}${bars}${labels}</svg></div>`;
}
function ringSVG(val,color,track,size){
  size=size||60; const r=size/2-6, c=2*Math.PI*r, off=c*(1-val/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle" font-size="${size*0.3}" font-weight="800" fill="${color==='#ffffff'?'#ffffff':'#16202c'}">${val}</text></svg>`;
}

function buildReport(s,kind){
  const date=new Date(s.ts).toLocaleString('es-ES');
  const segMin=t=>fmtTime(t);
  const head=`# EthosFlow — Informe de sesión\n\n- **Fecha:** ${date}\n- **Perfil:** ${S.settings.profile}\n- **Modo de captación:** ${s.mode==='micro'?'micrófono (análisis local, sin grabación)':'simulado/demo'}\n`;
  const datos=`\n## Datos clave (estimados)\n\n| Métrica | Valor |\n|---|---|\n| Duración | ${segMin(s.durationSec)} |\n| SES (Speech Efficiency Score) | ${s.ses} / 100 |\n| Habla eficiente | ${segMin(s.efficientSec)} |\n| Disfluencia estimada | ${segMin(s.disfluencySec)} |\n| Silencio | ${segMin(s.silenceSec)} |\n| Pausas reguladoras | ${s.regPauses} |\n| Activación media estimada | ${s.activation}/100 |\n`;
  const reco=`\n## Recomendaciones\n\n- ${closeAdvice(s)}\n- Objetivo del día sugerido: ${capacityIndex().obj}\n`;
  const seg=`\n## Reparto del tiempo\n\n- Eficiente: ${pct(s,'efficientSec')}%\n- Disfluencia: ${pct(s,'disfluencySec')}%\n- Silencio: ${pct(s,'silenceSec')}%\n- Pausa reguladora: ${pct(s,'pauseSec')}%\n`;
  const foot=`\n---\n_Herramienta de apoyo, no diagnóstico. El análisis de voz es estimado y no sustituye la valoración profesional. Datos generados localmente en el dispositivo._\n`;
  if(kind==='paciente'){
    return `# EthosFlow — Resumen para ti\n\n**${date}**\n\nHoy entrenaste **${segMin(s.durationSec)}** con una eficiencia estimada de **${s.ses}/100**.\n\n**Lo que ha ido bien:** ${s.ses>=55?'buen flujo de habla durante buena parte de la sesión.':'mantuviste la constancia y usaste pausas para regularte.'}\n\n**Para la próxima:** ${closeAdvice(s)}\n\nUsaste **${s.regPauses}** pausas reguladoras. ¡Bien por cuidarte el ritmo!\n${foot}`;
  }
  if(kind==='logopeda'){
    return `# EthosFlow — Resumen para logopeda\n\n${head}${datos}${seg}\n## Observaciones\n\n- Tendencia SES (últimas sesiones): ${sesTrend()>0?'+':''}${sesTrend()} puntos.\n- Media histórica SES: ${overallAvgSES()} (n=${S.sessions.length}).\n- Notas del paciente: ${s.notes||'—'}\n${foot}`;
  }
  return `${head}${datos}${seg}${reco}${foot}`;
}
function pct(s,f){ const tot=s.efficientSec+s.disfluencySec+s.silenceSec+s.pauseSec||1; return Math.round(s[f]/tot*100); }

function openReport(s){
  let kind="sesion";
  const ov=h(`<div class="modal-bg"><div class="modal">
    <div class="eyebrow">Informe</div><h3>Informe de sesión</h3>
    <div class="segctl" style="margin:10px 0">
      <button data-k="sesion" class="on">Sesión</button><button data-k="logopeda">Logopeda</button><button data-k="paciente">Paciente</button>
    </div>
    <pre class="report-pre" id="rpre"></pre>
    <div class="rowflex" style="margin-top:12px">
      <button class="btn sm" id="rcopy" style="flex:1">📋 Copiar</button>
      <button class="btn sm primary" id="rdl" style="flex:1">⬇ Descargar .md</button>
    </div>
    <button class="btn ghost" id="rclose">Cerrar</button>
  </div></div>`);
  overlay(ov);
  const render=()=>ov.querySelector('#rpre').textContent=buildReport(s,kind);
  render();
  ov.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{ ov.querySelectorAll('[data-k]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); kind=b.dataset.k; render(); });
  ov.querySelector('#rcopy').onclick=()=>{ const txt=buildReport(s,kind);
    navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>toast("Informe copiado ✓"),()=>fallbackCopy(txt)); };
  ov.querySelector('#rdl').onclick=()=>downloadMD(buildReport(s,kind),`ethosflow-${kind}-${s.date}.md`);
  ov.querySelector('#rclose').onclick=closeOverlay;
}
function fallbackCopy(txt){ const t=document.createElement('textarea'); t.value=txt; document.body.appendChild(t); t.select();
  try{document.execCommand('copy'); toast("Informe copiado ✓");}catch(e){toast("No se pudo copiar");} t.remove(); }
function downloadMD(txt,name){ const b=new Blob([txt],{type:"text/markdown"}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); toast("Descargando informe…"); }

  const wrap=document.createElement('div'); wrap.className="screen"; root.appendChild(wrap);
  // perfil
  wrap.appendChild(h(`<div class="sec-h"><h2>Perfil</h2></div>`));
  const prof=h(`<div class="pill-row"></div>`);
  [["paciente","Paciente","Uso personal diario"],["logopeda","Logopeda","Preparar y revisar sesiones"],["comunidad","Demo comunidad","Modo presentación"]].forEach(([id,t,d])=>{
    const o=h(`<button class="opt ${S.settings.profile===id?'on':''}"><b>${t}</b><span>${d}</span></button>`);
    o.onclick=()=>{ S.settings.profile=id; if(id==="comunidad"){S.settings.presentation=true;} save(); buzz(6); nav('ajustes'); document.getElementById('topsub').innerHTML=topSub(); };
    prof.appendChild(o);
  });
  wrap.appendChild(prof);

  // entrenamiento
  wrap.appendChild(h(`<div class="sec-h" style="margin-top:6px"><h2>Entrenamiento</h2></div>`));
  const c1=h(`<div class="card">
    <div class="slider-row"><label>Objetivo diario <b id="goalOut">${S.settings.dailyGoalMin} min</b></label>
      <input type="range" id="goal" min="3" max="30" step="1" value="${S.settings.dailyGoalMin}"></div>
    <div class="slider-row"><label>BPM base (ritmo) <b id="bpmOut2">${S.settings.baseBPM}</b></label>
      <input type="range" id="bpm" min="40" max="120" step="2" value="${S.settings.baseBPM}"></div>
    <div class="slider-row"><label>Sensibilidad del micrófono <b id="micOut">${S.settings.micSensitivity}%</b></label>
      <input type="range" id="mic" min="10" max="90" step="5" value="${S.settings.micSensitivity}">
      <div class="xs muted">Más alta = detecta voz más suave como habla eficiente.</div></div>
  </div>`);
  wrap.appendChild(c1);
  c1.querySelector('#goal').oninput=e=>{ S.settings.dailyGoalMin=+e.target.value; c1.querySelector('#goalOut').textContent=e.target.value+" min"; save(); };
  c1.querySelector('#bpm').oninput=e=>{ S.settings.baseBPM=+e.target.value; c1.querySelector('#bpmOut2').textContent=e.target.value; save(); };
  c1.querySelector('#mic').oninput=e=>{ S.settings.micSensitivity=+e.target.value; c1.querySelector('#micOut').textContent=e.target.value+"%"; save(); };

  // preferencias
  wrap.appendChild(h(`<div class="sec-h" style="margin-top:6px"><h2>Preferencias</h2></div>`));
  const c2=h(`<div class="card"></div>`);
  c2.appendChild(toggleRow("Vibración háptica","Pulsos en ritmo, respiración y avisos","vibration"));
  c2.appendChild(toggleRow("Modo presentación","Para mostrar la app en comunidad (datos demo)","presentation"));
  wrap.appendChild(c2);

  // datos
  wrap.appendChild(h(`<div class="sec-h" style="margin-top:6px"><h2>Datos y privacidad</h2></div>`));
  const c3=h(`<div class="card">
    <p class="small muted" style="margin-top:0">Todos tus datos se guardan únicamente en este dispositivo (localStorage). No se envían a ningún servidor.</p>
    <button class="btn sm" id="demoBtn" style="margin-bottom:8px">🎬 Cargar datos demo realistas</button>
    <button class="btn sm danger block" id="wipe">🗑️ Borrar todos mis datos</button>
  </div>`);
  wrap.appendChild(c3);
  c3.querySelector('#demoBtn').onclick=()=>{ seedDemo(true); toast("Datos demo cargados ✓"); nav('progreso'); };
  c3.querySelector('#wipe').onclick=()=>{ if(confirm("¿Borrar todos los datos de EthosFlow en este dispositivo?")){ localStorage.removeItem(KEY); S=JSON.parse(JSON.stringify(DEFAULT)); save(); toast("Datos borrados"); nav('inicio'); } };

  wrap.appendChild(h(`<div class="disclaimer">EthosFlow es una herramienta de apoyo y entrenamiento. No diagnostica, no sustituye terapia y no promete curación.<br>v2 · prototipo</div>`));
};
function toggleRow(title,desc,key){
  const row=h(`<div class="toggle"><div><div class="t">${title}</div><div class="d">${desc}</div></div>
    <div class="sw ${S.settings[key]?'on':''}"><i></i></div></div>`);
  row.querySelector('.sw').onclick=function(){ S.settings[key]=!S.settings[key]; this.classList.toggle('on'); save(); buzz(6); };
  return row;
}

//==================================================================
// OVERLAY
//==================================================================
function overlay(node, full){ const o=document.getElementById('overlay'); o.innerHTML=""; o.appendChild(node); }
function closeOverlay(){ document.getElementById('overlay').innerHTML=""; }

//==================================================================
// INIT
//==================================================================
function init(){
  const params=new URLSearchParams(location.search);
  if(params.get('demo')==='ethosflow'){ seedDemo(true); S.settings.presentation=true; S.settings.profile="comunidad"; save(); }
  document.getElementById('topsub').innerHTML=topSub();
  renderTabs();
  nav('inicio');
}
init();
</script>
</body>
</html>
